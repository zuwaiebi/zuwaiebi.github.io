<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>フレーバークイズ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <main class="screen screen--title active" id="screen-title">
      <header class="header-title">
        <h1>フレーバークイズ</h1>
      </header>
      <section class="title-panel">
        <div class="title-subtitle">今日のフレーバー</div>
        <div class="flavor-card flavor-card--title" id="today-flavor-card">
          <div class="flavor-card__text" id="today-flavor-text">読み込み中...</div>
          <div class="flavor-card__footer">
            <div class="flavor-card__name" id="today-flavor-name"></div>
            <div class="flavor-card__code" id="today-flavor-code"></div>
          </div>
        </div>
      </section>
      <section class="title-actions">
        <button class="main-button main-button--start" id="btn-start">ゲームスタート</button>
        <button class="main-button main-button--secondary" id="btn-ginko">フレーバー吟行</button>
      </section>
    </main>

    <main class="screen screen--quiz" id="screen-quiz">
      <div class="quiz-header">
        <button class="small-button" id="btn-quit">ゲームをやめる</button>
        <div class="quiz-status">
          <div>問題 <span id="quiz-number">1</span> / 10</div>
          <div>⏱ <span id="quiz-timer">60</span>秒</div>
          <div class="quiz-correct">正解数: <span id="quiz-score">0</span></div>
        </div>
      </div>
      <section class="quiz-question">
        <div class="question-box">
          <div class="question-text" id="quiz-question-text">お題のフレーバーテキスト</div>
        </div>
      </section>
      <section class="choices-grid" id="choices-grid"></section>
      <section class="quiz-action">
        <button class="main-button main-button--disabled" id="btn-submit" disabled>決定</button>
      </section>
      <div class="feedback-message" id="feedback-message"></div>
    </main>

    <main class="screen screen--result" id="screen-result">
      <div class="result-header">
        <h2>結果発表</h2>
        <div class="result-score"><span id="result-correct">0</span>/10 正解</div>
      </div>
      <div class="result-list" id="result-list"></div>
      <div class="result-actions">
        <button class="main-button main-button--start" id="btn-return-title">タイトルに戻る</button>
      </div>
    </main>

    <main class="screen screen--ginko" id="screen-ginko">
      <header class="header-title">
        <h1>フレーバー吟行</h1>
      </header>
      <section class="title-panel">
        <div class="flavor-card flavor-card--ginko" id="ginko-flavor-card">
          <div class="flavor-card__text" id="ginko-flavor-text">読み込み中...</div>
          <div class="flavor-card__footer">
            <div class="flavor-card__name" id="ginko-flavor-name"></div>
            <div class="flavor-card__code" id="ginko-flavor-code"></div>
          </div>
        </div>
      </section>
      <section class="title-actions title-actions--ginko">
        <button class="main-button main-button--start" id="btn-ginko-next">吟行を続ける</button>
        <button class="main-button main-button--secondary" id="btn-ginko-back">タイトルに戻る</button>
      </section>
    </main>
  </div>

  <footer class="page-footer">
    <p>当サイトはファンコンテンツ・ポリシーに沿った非公式のファンコンテンツです。ウィザーズ社の認可/許諾は得ていません。<br>

    カードデータ・画像の著作権は © タカラトミー に帰属します。</p>
  </footer>

  <script src="embedded_cards.js"></script>
  <script src="script.js"></script>
</body>
</html>
